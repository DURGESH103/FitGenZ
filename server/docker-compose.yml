version: "3.9"

services:
  api:
    build: .
    container_name: fitgenz-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: youthfit_ai
      JWT_SECRET: change_me
      JWT_REFRESH_SECRET: change_me_refresh
      CORS_ORIGIN: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: fitgenz-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: fitgenz-redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
